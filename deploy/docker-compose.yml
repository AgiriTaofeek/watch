services:
  postgres:
    image: postgres:17-alpine
    container_name: watch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watch}
      POSTGRES_DB: ${POSTGRES_DB:-watch}
    ports:
      - "5432:5432"
    volumes:
      - watch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watch} -d ${POSTGRES_DB:-watch}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  pgweb:
    image: sosedoff/pgweb:0.16.2
    container_name: watch-pgweb
    profiles:
      - db-ui
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGWEB_DATABASE_URL: postgres://${POSTGRES_USER:-watch}:${POSTGRES_PASSWORD:-watch}@postgres:5432/${POSTGRES_DB:-watch}?sslmode=disable
    ports:
      - "8081:8081"
    restart: unless-stopped

volumes:
  watch_postgres_data:
    name: watch_postgres_data
