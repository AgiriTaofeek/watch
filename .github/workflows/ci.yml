name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          # No go.sum yet (zero external deps); key the cache off go.mod so
          # setup-go can still resolve a real file. Switch to go.sum once deps land.
          cache-dependency-path: apps/server/go.mod

      - run: pnpm install --frozen-lockfile

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: apps/server

      - run: pnpm exec biome check .
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
